<style>
  :root{
    --navy-950:#0B1730;
    --navy-900:#0F1F3F;
    --navy-800:#16294F;
    --navy-700:#1E3868;
    --gold-600:#8C6B33;
    --gold-500:#B58A4A;
    --gold-300:#D9BC85;
    --cream-50:#F6F1E7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 700px at 50% -10%, rgba(181,138,74,0.14), transparent 60%),
      linear-gradient(180deg, var(--navy-950) 0%, var(--navy-900) 45%, var(--navy-950) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px 40px;
    font-family:'Tajawal', 'Segoe UI', Tahoma, sans-serif;
    color:var(--cream-50);
  }
  .card{
    width:100%;
    max-width:440px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .emblem-wrap{
    position:relative;
    width:190px;
    height:190px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:22px;
    animation: rise .7s ease both;
  }
  .emblem-wrap::before{
    content:"";
    position:absolute;
    inset:-18px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(181,138,74,0.35), rgba(181,138,74,0) 70%);
    filter:blur(2px);
  }
  .emblem-wrap img{
    position:relative;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    border:2px solid rgba(181,138,74,0.55);
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .tagline{
    font-size:15.5px;
    line-height:1.9;
    color:var(--gold-300);
    max-width:340px;
    margin:0 0 22px;
    animation: rise .7s ease .1s both;
  }
  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    max-width:220px;
    margin-bottom:26px;
    animation: rise .7s ease .15s both;
  }
  .divider .line{
    flex:1;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-500), transparent);
  }
  .divider .diamond{
    width:7px;height:7px;
    background:var(--gold-500);
    transform:rotate(45deg);
    flex-shrink:0;
  }
  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:100%;
  }
  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    padding:16px 18px;
    background:var(--navy-800);
    border:1px solid rgba(181,138,74,0.35);
    border-radius:14px;
    color:var(--cream-50);
    text-decoration:none;
    font-size:16px;
    font-weight:500;
    transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    animation: rise .7s ease both;
  }
  .link-btn:nth-child(1){animation-delay:.2s;}
  .link-btn:nth-child(2){animation-delay:.28s;}
  .link-btn:nth-child(3){animation-delay:.36s;}
  .link-btn:nth-child(4){animation-delay:.44s;}
  .link-btn:hover, .link-btn:focus-visible{
    transform:translateY(-2px);
    border-color:var(--gold-500);
    background:var(--navy-700);
    box-shadow:0 8px 20px rgba(0,0,0,0.35);
  }
  .link-btn:active{transform:translateY(0);}
  .icon{
    flex-shrink:0;
    width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    color:var(--gold-500);
  }
  .icon svg{width:100%;height:100%;}
  .label{flex:1;text-align:start;}
  .chev{
    flex-shrink:0;
